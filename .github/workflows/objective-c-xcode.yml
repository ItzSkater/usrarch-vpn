name: Hiddify Custom iOS Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # КРИТИЧНО для кастомных ядер (core)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Часто нужно для компиляции i2p/sing-box ядер

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          # Если у вас есть скрипты для подготовки ядер (например, в папке scripts)
          # chmod +x ./scripts/build_cores.sh
          # ./scripts/build_cores.sh

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Hiddify_Custom.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-Custom-IPA
          path: Hiddify_Custom.ipa

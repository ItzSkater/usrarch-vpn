display_name: U Flow
package_name: uflow
maintainer:
  name: uflow
  email: linux@uflow.com

priority: optional
section: x11
installed_size: 6604
essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting uflow.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up U Flow..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=app.uflow.com' "/usr/share/applications/uflow.desktop"
  - echo "Search and remove uflow.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/uflow.desktop" ]; then rm -f "$user_dir/.local/share/applications/uflow.desktop"; echo "Found and removed uflow.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "U Flow is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove U Flow configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing U Flow user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/uflow" ]; then rm -rf "$user_dir/.local/share/uflow"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/uflow
  - echo "U Flow data cleanup complete."

keywords:
